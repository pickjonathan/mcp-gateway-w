apiVersion: 1
datasources:
  # Explore traces/spans from inside Grafana (Explore → Jaeger). Grafana reaches
  # Jaeger over the compose network. Trace spans link back to the Prometheus
  # metrics datasource for span→metric correlation.
  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
