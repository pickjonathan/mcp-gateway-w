# Dev scrape config for the MCP runtime. Prometheus reaches the services over the
# compose network by service name. Open http://localhost:9090 to query, e.g.:
#   mcp_requests_total
#   rate(mcp_tool_calls_total[1m])
global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]
  - job_name: control-plane
    static_configs:
      - targets: ["control-plane:8090"]
