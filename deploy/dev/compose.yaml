name: mcp-runtime-dev

# Local dev stack for the MCP runtime control/data plane.
# NOTE: the stdio sandbox (US3) runs gVisor/microVMs and is brought up separately
# (see sandbox-runtime-options.md); this compose covers the non-sandbox services.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: mcp
    # Provisions the non-superuser `mcp_app` runtime role (so RLS is enforced).
    # Runs only on a fresh data dir — recreate the container to (re)apply.
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  vault:
    image: hashicorp/vault:1.17
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root
    ports: ["8200:8200"]

  # Object storage for the durable, Object-Lock'd audit archive (T087). The app
  # creates its bucket with object locking enabled. Console at http://localhost:9001.
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports: ["8081:8080"]

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    environment:
      MCP_ENV: dev
      MCP_HTTP_ADDR: ":8080"
      MCP_BASE_DOMAIN: mcp.example.com
      MCP_LOG_FORMAT: json
      MCP_POSTGRES_DSN: postgres://mcp_app:mcp_app@postgres:5432/mcp?sslmode=disable
      MCP_REDIS_ADDR: redis:6379
      MCP_VAULT_ADDR: http://vault:8200
      MCP_KEYCLOAK_ISSUER_TEMPLATE: http://keycloak:8080/realms/%s
      MCP_OTLP_ENDPOINT: jaeger:4318
    ports: ["8080:8080"]
    depends_on: [postgres, redis, vault, keycloak]

  control-plane:
    build:
      context: ../..
      dockerfile: services/control-plane/Dockerfile
    environment:
      MCP_ENV: dev
      MCP_HTTP_ADDR: ":8090"
      MCP_BASE_DOMAIN: mcp.example.com
      MCP_LOG_FORMAT: json
      MCP_REDIS_ADDR: redis:6379
      MCP_POSTGRES_DSN: postgres://mcp_app:mcp_app@postgres:5432/mcp?sslmode=disable
      MCP_VAULT_ADDR: http://vault:8200
      MCP_KEYCLOAK_ISSUER_TEMPLATE: http://keycloak:8080/realms/%s
      MCP_ADMIN_AUDIENCE: https://api.mcp.example.com
      MCP_AUDIT_S3_ENDPOINT: minio:9000
      MCP_AUDIT_S3_ACCESS_KEY: minioadmin
      MCP_AUDIT_S3_SECRET_KEY: minioadmin
      MCP_AUDIT_S3_BUCKET: mcp-audit
      MCP_AUDIT_RETENTION: 8760h
    ports: ["8090:8090"]
    depends_on: [postgres, redis, vault, keycloak, minio]

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["9090:9090"]
    depends_on: [gateway, control-plane]

  # Dashboards + alerts over the Prometheus metrics (T088). Anonymous admin for
  # dev only. UI at http://localhost:3000 (dashboard: "MCP Runtime Overview").
  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]

  # Trace backend (accepts OTLP/HTTP on 4318); UI at http://localhost:16686.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686", "4318:4318"]
