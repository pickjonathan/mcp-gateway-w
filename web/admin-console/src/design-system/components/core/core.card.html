<!-- @dsCard group="Components" viewport="700x340" name="Core — Button, Tag, Tile" subtitle="Buttons (5 kinds), tags and tiles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); }
  .sec { margin-bottom: 22px; }
  .h { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 600; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Tag, Tile } = window.CarbonDesignSystem_666911;
    const Icon = ({ n, s = 16 }) => <img src={`../../assets/icons/${n}.svg`} width={s} height={s} alt="" />;
    function Demo() {
      return (
        <>
          <div className="sec">
            <div className="h">Buttons</div>
            <div className="row">
              <Button kind="primary" renderIcon={<Icon n="arrow-right" />}>Primary</Button>
              <Button kind="secondary">Secondary</Button>
              <Button kind="tertiary">Tertiary</Button>
              <Button kind="ghost">Ghost</Button>
              <Button kind="danger" renderIcon={<Icon n="trash-can" />}>Delete</Button>
              <Button kind="primary" disabled>Disabled</Button>
              <Button iconOnly kind="ghost" renderIcon={<Icon n="settings" s={20} />} aria-label="Settings" />
            </div>
          </div>
          <div className="sec">
            <div className="h">Tags</div>
            <div className="row">
              <Tag type="blue">Running</Tag>
              <Tag type="green" renderIcon={<Icon n="checkmark-filled" />}>Healthy</Tag>
              <Tag type="red">Failed</Tag>
              <Tag type="purple">Beta</Tag>
              <Tag type="teal">Staging</Tag>
              <Tag type="outline">Draft</Tag>
              <Tag type="gray" filter>us-south</Tag>
            </div>
          </div>
          <div className="sec">
            <div className="h">Tiles</div>
            <div className="tiles">
              <Tile><strong className="cds-type-heading-compact-02">Cloud Foundry</strong><div className="cds-type-body-01" style={{color:'var(--text-secondary)',marginTop:4}}>Deploy without infra</div></Tile>
              <Tile variant="clickable" href="#"><strong className="cds-type-heading-compact-02">Open service</strong><div className="cds-type-body-01" style={{color:'var(--link-primary)',marginTop:4}}>Launch →</div></Tile>
              <Tile variant="selectable" selected><strong className="cds-type-heading-compact-02">Standard</strong><div className="cds-type-body-01" style={{color:'var(--text-secondary)',marginTop:4}}>$0.02 / hr</div></Tile>
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
