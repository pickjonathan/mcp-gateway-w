<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 32px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { TextInput, Select, Search, Checkbox, Toggle } = window.CarbonDesignSystem_666911;
    function Demo() {
      return (
        <div className="grid">
          <div className="stack">
            <TextInput label="Service name" defaultValue="inference-api" helperText="Lowercase, no spaces" />
            <TextInput label="Token" invalid invalidText="This token has expired." defaultValue="sk-live-…" />
            <Search placeholder="Find a resource" defaultValue="vpc" />
          </div>
          <div className="stack">
            <Select label="Region" defaultValue="us-south">
              <option value="us-south">Dallas (us-south)</option>
              <option value="eu-de">Frankfurt (eu-de)</option>
              <option value="jp-tok">Tokyo (jp-tok)</option>
            </Select>
            <div style={{display:'flex', flexDirection:'column', gap:10}}>
              <Checkbox label="Enable autoscaling" defaultChecked />
              <Checkbox label="Public endpoint" />
              <Checkbox label="Locked policy" disabled />
            </div>
            <Toggle label="Monitoring" defaultChecked />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
