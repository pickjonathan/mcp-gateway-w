name: admin-console

on:
  push:
    paths:
      - 'web/admin-console/**'
      - '.github/workflows/admin-console.yml'
  pull_request:
    paths:
      - 'web/admin-console/**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/admin-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/admin-console/package-lock.json
      - run: npm ci
      - run: npm run lint          # Carbon design-system adherence (FR-021)
      - run: npm run build         # tsc typecheck + vite build
      - run: npm run test          # vitest: unit + contract + adversarial + a11y
      # E2E (Playwright + axe) runs separately — needs `npx playwright install`
      # and a mock-backed dev server; not in the default CI gate.
